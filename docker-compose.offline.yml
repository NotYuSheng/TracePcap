# docker-compose.offline.yml
#
# Offline deployment variant — uses pre-built images loaded via scripts/load-images.sh
# instead of building from source.
#
# Prerequisites:
#   1. On an internet-connected machine:  bash scripts/pull-and-save-images.sh
#   2. Transfer images/, this file, and .env to the offline machine.
#   3. On the offline machine:            bash scripts/load-images.sh
#
# Start:  docker compose -f docker-compose.offline.yml up -d
# Stop:   docker compose -f docker-compose.offline.yml down

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lanturn-postgres
    environment:
      POSTGRES_DB: lanturn
      POSTGRES_USER: lanturn_user
      POSTGRES_PASSWORD: lanturn_pass
      TZ: Asia/Singapore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanturn_user -d lanturn"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lanturn-network

  # MinIO Object Storage
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: lanturn-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Singapore
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lanturn-network

  # MinIO Client (mc) - Create bucket on startup
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: lanturn-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/lanturn-files --ignore-existing;
      /usr/bin/mc anonymous set public myminio/lanturn-files;
      exit 0;
      "
    networks:
      - lanturn-network

  # Spring Boot Backend (pre-built image)
  backend:
    image: lanturn-backend:latest
    container_name: lanturn-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/lanturn
      DATABASE_USERNAME: lanturn_user
      DATABASE_PASSWORD: lanturn_pass
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lanturn-files
      APP_MEMORY_MB: ${APP_MEMORY_MB:-2048}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-http://localhost:1234/v1}
      LLM_API_KEY: ${LLM_API_KEY:-your-api-key-here}
      LLM_MODEL: ${LLM_MODEL:-gpt-4}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2000}
      LLM_CONTEXT_LENGTH: ${LLM_CONTEXT_LENGTH:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-300}
      # Network Intelligence cluster limits
      TRACEPCAP_INTELLIGENCE_MAX_CLUSTERS: ${INTELLIGENCE_MAX_CLUSTERS:-60}
      TRACEPCAP_INTELLIGENCE_MAX_EDGES: ${INTELLIGENCE_MAX_EDGES:-200}
      TZ: Asia/Singapore
    volumes:
      - config_data:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lanturn-network

  # Nginx - Serves frontend and proxies API to backend (pre-built image)
  # Note: frontend build args (VITE_*) are baked into this image at build time.
  # To change them, rebuild the image with pull-and-save-images.sh.
  nginx:
    image: lanturn-nginx:latest
    container_name: lanturn-nginx
    environment:
      APP_MEMORY_MB: ${APP_MEMORY_MB:-2048}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-300}
      TZ: Asia/Singapore
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - lanturn-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  config_data:
    driver: local

networks:
  lanturn-network:
    driver: bridge
