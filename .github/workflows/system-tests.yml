name: System Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/system-tests.yml'

permissions:
  contents: read

jobs:
  system:
    name: Analysis pipeline (full stack)
    runs-on: ubuntu-latest

    # No .env file in CI (it's gitignored), so compose would default NGINX_PORT
    # to 80. Pin it to 8888 to match the readiness check and the test base URL.
    env:
      NGINX_PORT: '8888'
      RUN_SYSTEM_TESTS: 'true'
      E2E_BASE_URL: 'http://127.0.0.1:8888'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for app to be ready
        # Use 127.0.0.1, not localhost: Docker publishes the port on IPv4 only,
        # but localhost can resolve to IPv6 (::1) first and fail to connect.
        run: |
          for i in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8888/api/v1/files)" = "200" ]; then
              echo "App is up"; exit 0
            fi
            sleep 5
          done
          echo "App did not become ready in time"
          docker compose logs --tail=100
          exit 1

      - name: Run system tests against the running stack
        working-directory: backend
        run: mvn -B -Dtest=AnalysisCompletionSystemTest -DfailIfNoTests=false test

      - name: Tear down
        if: always()
        run: docker compose down -v
