spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    root: INFO
    com.lanturn: INFO
    org.springframework: WARN
    org.hibernate: WARN
  file:
    name: logs/lanturn-dev.log

# Development-specific MinIO (uses environment variable or fallback)
# minio:
#   endpoint: http://localhost:9000
#   access-key: minioadmin
#   secret-key: minioadmin

# Development database (uses environment variables or fallback from main config)
# spring.datasource:
#   url: jdbc:postgresql://localhost:5432/lanturn
#   username: lanturn_user
#   password: lanturn_pass

# Disable production optimizations
server:
  compression:
    enabled: false

# Allow all origins in development
cors:
  allowed-origins: "*"
  allow-credentials: false
